apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: modblocker
  namespace: kube-system
  labels:
    app.kubernetes.io/name: modblocker
    app.kubernetes.io/component: node-mitigation
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: modblocker
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modblocker
        app.kubernetes.io/component: node-mitigation
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: disable-vulnerable-modules
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DROP_CACHES_ON_REMEDIATION
              value: "true"
          command:
            - /bin/sh
            - -ceu
            - |
              config_file=/host/etc/modprobe.d/disable-copyfail.conf
              dirtyfrag_rules_added=false
              touch "$config_file"

              for line in \
                "blacklist algif_aead" \
                "install algif_aead /bin/false" \
                "install esp4 /bin/false" \
                "install esp6 /bin/false" \
                "install rxrpc /bin/false"
              do
                if ! grep -qxF "$line" "$config_file"; then
                  printf '%s\n' "$line" >> "$config_file"
                  case "$line" in
                    "blacklist algif_aead"|"install algif_aead /bin/false")
                      ;;
                    *)
                      dirtyfrag_rules_added=true
                      ;;
                  esac
                fi
              done

              DIRTYFRAG_RULES_ADDED="$dirtyfrag_rules_added" \
              DROP_CACHES_ON_REMEDIATION="${DROP_CACHES_ON_REMEDIATION:-true}" \
              chroot /host /bin/sh -ceu '
                modprobe_bin=$(command -v modprobe)

                if [ -z "$modprobe_bin" ]; then
                  echo "host modprobe is missing" >&2
                  exit 1
                fi

                dirtyfrag_modules_unloaded=false

                for module in algif_aead esp4 esp6 rxrpc; do
                  if grep -q "^${module} " /proc/modules; then
                    echo "unloading ${module}" >&2
                    "$modprobe_bin" -r "$module"

                    case "$module" in
                      esp4|esp6|rxrpc)
                        dirtyfrag_modules_unloaded=true
                        ;;
                    esac
                  fi
                done

                if [ "${DROP_CACHES_ON_REMEDIATION}" = "true" ] && { [ "${DIRTYFRAG_RULES_ADDED}" = "true" ] || [ "${dirtyfrag_modules_unloaded}" = "true" ]; }; then
                  sync
                  echo 3 > /proc/sys/vm/drop_caches
                fi
              '
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
      restartPolicy: Always
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
