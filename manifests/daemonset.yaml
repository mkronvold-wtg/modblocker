apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: modblocker
  namespace: kube-system
  labels:
    app.kubernetes.io/name: modblocker
    app.kubernetes.io/component: node-mitigation
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: modblocker
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modblocker
        app.kubernetes.io/component: node-mitigation
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostPID: true
      terminationGracePeriodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: disable-vulnerable-modules
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DROP_CACHES_ON_REMEDIATION
              value: "true"
          command:
            - /bin/sh
            - -ceu
            - |
              config_file=/host/etc/modprobe.d/modblocker.conf
              dirtyfrag_rules_added=false
              touch "$config_file"

              for line in \
                "blacklist algif_aead" \
                "install algif_aead /bin/false" \
                "install esp4 /bin/false" \
                "install esp6 /bin/false" \
                "install rxrpc /bin/false"
              do
                if ! grep -qxF "$line" "$config_file"; then
                  printf '%s\n' "$line" >> "$config_file"
                  case "$line" in
                    "blacklist algif_aead"|"install algif_aead /bin/false")
                      ;;
                    *)
                      dirtyfrag_rules_added=true
                      ;;
                  esac
                fi
              done

              DIRTYFRAG_RULES_ADDED="$dirtyfrag_rules_added" \
              DROP_CACHES_ON_REMEDIATION="${DROP_CACHES_ON_REMEDIATION:-true}" \
              chroot /host /bin/sh -ceu '
                modprobe_bin=$(command -v modprobe)

                if [ -z "$modprobe_bin" ]; then
                  echo "host modprobe is missing" >&2
                  exit 1
                fi

                dirtyfrag_modules_unloaded=false

                for module in algif_aead esp4 esp6 rxrpc; do
                  if grep -q "^${module} " /proc/modules; then
                    echo "unloading ${module}" >&2
                    "$modprobe_bin" -r "$module"

                    case "$module" in
                      esp4|esp6|rxrpc)
                        dirtyfrag_modules_unloaded=true
                        ;;
                    esac
                  fi
                done

                if [ "${DROP_CACHES_ON_REMEDIATION}" = "true" ] && { [ "${DIRTYFRAG_RULES_ADDED}" = "true" ] || [ "${dirtyfrag_modules_unloaded}" = "true" ]; }; then
                  sync
                  echo 3 > /proc/sys/vm/drop_caches
                fi
              '
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: Unconfined
          resources:
            requests:
              cpu: 10m
              ephemeral-storage: 16Mi
              memory: 16Mi
            limits:
              cpu: 50m
              ephemeral-storage: 64Mi
              memory: 32Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
      containers:
        - name: monitor-state
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          env:
            - name: MONITOR_INTERVAL_SECONDS
              value: "15"
          command:
            - /bin/sh
            - -ceu
            - |
              config_file=/host/etc/modprobe.d/modblocker.conf
              healthy_file=/status/healthy
              heartbeat_file=/status/heartbeat
              reason_file=/status/reason

              while true; do
                failures=0
                : > "${reason_file}.tmp"

                if [ ! -f "$config_file" ]; then
                  echo "missing host config: $config_file" >> "${reason_file}.tmp"
                  failures=1
                else
                  for line in \
                    "blacklist algif_aead" \
                    "install algif_aead /bin/false" \
                    "install esp4 /bin/false" \
                    "install esp6 /bin/false" \
                    "install rxrpc /bin/false"
                  do
                    if ! grep -qxF "$line" "$config_file"; then
                      echo "missing config rule: $line" >> "${reason_file}.tmp"
                      failures=1
                    fi
                  done
                fi

                for module in algif_aead esp4 esp6 rxrpc; do
                  if grep -q "^${module} " /proc/modules; then
                    echo "module still loaded: ${module}" >> "${reason_file}.tmp"
                    failures=1
                  fi
                done

                printf '%s\n' "$(date +%s)" > "${heartbeat_file}.tmp"
                mv "${heartbeat_file}.tmp" "$heartbeat_file"

                if [ "$failures" -eq 0 ]; then
                  printf 'healthy\n' > "${healthy_file}.tmp"
                  mv "${healthy_file}.tmp" "$healthy_file"
                  printf 'all required config rules are present and target modules are absent\n' > "${reason_file}.tmp"
                  mv "${reason_file}.tmp" "$reason_file"
                else
                  rm -f "$healthy_file"
                  mv "${reason_file}.tmp" "$reason_file"
                fi

                sleep "${MONITOR_INTERVAL_SECONDS:-15}"
              done
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ceu
                - test -f /status/healthy
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 1
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ceu
                - test -f /status/heartbeat && now=$(date +%s) && last=$(cat /status/heartbeat) && [ $((now - last)) -lt 45 ]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 5m
              ephemeral-storage: 16Mi
              memory: 16Mi
            limits:
              cpu: 25m
              ephemeral-storage: 64Mi
              memory: 32Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: monitor-status
              mountPath: /status
      restartPolicy: Always
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: monitor-status
          emptyDir: {}
