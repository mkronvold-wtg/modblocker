apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: modblocker
  namespace: kube-system
  labels:
    app.kubernetes.io/name: modblocker
    app.kubernetes.io/component: node-mitigation
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: modblocker
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modblocker
        app.kubernetes.io/component: node-mitigation
    spec:
      hostPID: true
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: disable-algif-aead
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              config_file=/host/etc/modprobe.d/disable-copyfail.conf
              touch "$config_file"

              for line in \
                "blacklist algif_aead" \
                "install algif_aead /bin/false"
              do
                if ! grep -qxF "$line" "$config_file"; then
                  printf '%s\n' "$line" >> "$config_file"
                fi
              done

              chroot /host /bin/sh -ceu '
                modprobe_bin=$(command -v modprobe)

                if [ -z "$modprobe_bin" ]; then
                  echo "host modprobe is missing" >&2
                  exit 1
                fi

                if grep -q "^algif_aead " /proc/modules; then
                  "$modprobe_bin" -r algif_aead
                fi
              '
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
      restartPolicy: Always
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
